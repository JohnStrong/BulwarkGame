<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medieval Tower Defense - Isometric</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f08;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            overflow: auto;
        }
        #gameCanvas {
            image-rendering: pixelated;
        }
        #ui {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="ui">Isometric view (2.5D)</div>
    <canvas id="gameCanvas"></canvas>
    <script src="js/game-logic/utils.js"></script>
    <script src="js/game-logic/sprites.js"></script>
    <script src="js/game-logic/unit-manager.js"></script>
    <script src="js/game-logic/level-loader.js"></script>
    <script src="js/game-logic/game-iso.js"></script>
</body>
</html>
