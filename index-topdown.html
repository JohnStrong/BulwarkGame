<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulwark - Top Down</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
        }
        #gameCanvas {
            border: 2px solid #e94560;
            background: #16213e;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #eee;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        <p>A turn based experience</p>
    </div>
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    <script src="js/game-logic/utils.js"></script>
    <script src="js/game-logic/sprites.js"></script>
    <script src="js/game-logic/level-loader.js"></script>
    <script src="js/game-logic/game.js"></script>
</body>
</html>
